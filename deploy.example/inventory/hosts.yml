# Шаблон инвентаря: из корня репозитория — cp -a deploy.example deploy
# Затем правьте deploy/inventory/hosts.yml под свою инфраструктуру.
#
# Переменные групп — в inventory/group_vars/ (all, main, relays, relay_minimal, tgproxy).
#
# SSH-ключи: задайте asgard_ssh_public_keys в group_vars/all.yml или host_vars для
# автоматической настройки при init_server. См. group_vars/all.yml.
#
# Опционально на хосте relay: asgard_ufw_tcp_ports / asgard_ufw_udp_ports — списки портов UFW.

main:
  hosts:
    main-server-01:
      ansible_host: 192.168.1.10
      ansible_user: admin
      ansible_port: 1122
      ansible_password: "{{ asgard_main_password }}"
      ansible_sudo_pass: "{{ asgard_main_password }}"
      primary_domain: main.example.com
      subscription_domain: sub.example.com
      assets_domain: assets.example.com
      public_domains:
        - "{{ primary_domain }}"
        - "{{ subscription_domain }}"
        - "{{ assets_domain }}"
  # Переменные группы main — см. group_vars/main.yml

relays:
  hosts:
    relay-server-01:
      ansible_host: 192.168.1.20
      ansible_user: admin
      ansible_port: 1122
      ansible_password: "{{ asgard_relay_password }}"
      ansible_sudo_pass: "{{ asgard_relay_password }}"
      primary_domain: relay1.example.com
      ocserv_domain: ocserv1.example.com
      # ocserv_exclude_users: []  # не генерировать из панели (напр. те же логины, что в ocserv_legacy_users)
      # ocserv_legacy_users — в secrets.enc: доп. строки ocpasswd после пользователей Remnawave
      public_domains:
        - "{{ primary_domain }}"
        - "{{ ocserv_domain }}"
      # asgard_ufw_tcp_ports: ["{{ remnawave_app_port }}", "{{ xray_main_port }}"]
      # asgard_ufw_udp_ports: ["{{ amnezia_port }}"]
      # Пример точечного override обфускации AmneziaWG для конкретного relay:
      # awg_jc: 7
      # awg_jmin: 50
      # awg_jmax: 1000
      # awg_s1: 86
      # awg_s2: 574
      # awg_s3: 0
      # awg_s4: 0
      # awg_h1: "471800590-471800690"
      # awg_h2: "1246894907-1246895000"
      # awg_h3: "923637689-923637690"
      # awg_h4: "1769581055-1869581055"
      # awg_i1: "<b 0xc700000001><rc 8><t><r 100>"
      # awg_i2: "<b 0xf6ab3267fa><t><rc 20><r 80>"
      # awg_i3: ""
      # awg_i4: ""
      # awg_i5: ""
    # relay-server-02:
    #   ansible_host: 192.168.1.21
    #   ...
  children:
    # Минимальные relay (ex-hole): только remnanode, без доп. сервисов.
    # group_vars/relay_minimal.yml отключает все enable_*
    relay_minimal:
      hosts:
        hole-server-01:
          ansible_host: 192.168.1.40
          ansible_user: admin
          ansible_port: 1122
          ansible_password: "{{ asgard_relay_password }}"
          ansible_sudo_pass: "{{ asgard_relay_password }}"
          primary_domain: hole1.example.com
          ocserv_domain: "{{ primary_domain }}"
          public_domains:
            - "{{ primary_domain }}"
  # Переменные: group_vars/relays.yml, relay_minimal — group_vars/relay_minimal.yml

tgproxy:
  hosts:
    tgproxy-server-01:
      ansible_host: 192.168.1.30
      ansible_user: admin
      ansible_port: 1122
      ansible_password: "{{ asgard_relay_password }}"
      ansible_sudo_pass: "{{ asgard_relay_password }}"
      primary_domain: tgproxy1.example.com
      mtproto_camouflage_domain: www.example.org
      mtproto_secret: "{{ mtproto_secret }}"
      self_steal: false
      public_domains:
        - "{{ primary_domain }}"
  # Переменные группы tgproxy — см. group_vars/tgproxy.yml
