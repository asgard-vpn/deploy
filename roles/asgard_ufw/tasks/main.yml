---
# UFW: открытие портов для Asgard сервисов

- name: Open UDP ports
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: udp
    state: enabled
  loop: "{{ asgard_ufw_udp_ports | default([]) }}"

- name: Open TCP ports
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
    state: enabled
  loop: "{{ asgard_ufw_tcp_ports | default([]) }}"
