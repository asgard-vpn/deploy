---
# UFW: открытие портов для Asgard сервисов

- name: Allow node port (remnawave)
  community.general.ufw:
    rule: allow
    proto: tcp
    port: "{{ remnawave_app_port }}"
    state: enabled
  when:
    - asgard_ufw_allow_node_port | default(false) | bool
    - remnawave_app_port is defined

- name: Open UDP ports
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: udp
    state: enabled
  loop: "{{ asgard_ufw_udp_ports | default([]) }}"

- name: Open TCP ports
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
    state: enabled
  loop: "{{ asgard_ufw_tcp_ports | default([]) }}"
