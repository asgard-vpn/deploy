---
# Fallback-заглушки для HAProxy (index.html, 403.html).
# По умолчанию — из fallback/ (корень проекта).
# Переопределение: положите свои index.html и/или 403.html в inventory/fallback/.

- name: Check for custom fallback in inventory
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/inventory/fallback/index.html"
  register: custom_fallback_index
  delegate_to: localhost
  run_once: true
  ignore_errors: true

- name: Check for custom fallback 403 in inventory
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/inventory/fallback/403.html"
  register: custom_fallback_403
  delegate_to: localhost
  run_once: true
  ignore_errors: true

- name: Copy default fallback files
  ansible.builtin.copy:
    src: fallback/
    dest: "{{ asgard_fallback_dest | default('/opt/asgard/fallback') }}/"
    mode: "0644"
    owner: root
    group: root

- name: Overlay custom fallback index.html from inventory
  ansible.builtin.copy:
    src: inventory/fallback/index.html
    dest: "{{ asgard_fallback_dest | default('/opt/asgard/fallback') }}/index.html"
    mode: "0644"
    owner: root
    group: root
  when: custom_fallback_index is succeeded and custom_fallback_index.stat.exists

- name: Overlay custom fallback 403.html from inventory
  ansible.builtin.copy:
    src: inventory/fallback/403.html
    dest: "{{ asgard_fallback_dest | default('/opt/asgard/fallback') }}/403.html"
    mode: "0644"
    owner: root
    group: root
  when: custom_fallback_403 is succeeded and custom_fallback_403.stat.exists
