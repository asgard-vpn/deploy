---
# Fallback-заглушки для HAProxy (index.html, 403.html).
# По умолчанию — из fallback/ (корень проекта).
# Переопределение: deploy/fallback/ (см. run_playbook.sh: -i deploy/inventory).

- name: Check for custom fallback in deploy
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/deploy/fallback/index.html"
  register: custom_fallback_index
  delegate_to: localhost
  run_once: true
  become: false
  ignore_errors: true

- name: Check for custom fallback 403 in deploy
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/deploy/fallback/403.html"
  register: custom_fallback_403
  delegate_to: localhost
  run_once: true
  become: false
  ignore_errors: true

- name: Copy default fallback files
  ansible.builtin.copy:
    src: fallback/
    dest: "{{ asgard_fallback_dest | default('/opt/asgard/fallback') }}/"
    mode: "0644"
    owner: root
    group: root

- name: Overlay custom fallback index.html from deploy
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/deploy/fallback/index.html"
    dest: "{{ asgard_fallback_dest | default('/opt/asgard/fallback') }}/index.html"
    mode: "0644"
    owner: root
    group: root
  when: custom_fallback_index is succeeded and custom_fallback_index.stat.exists

- name: Overlay custom fallback 403.html from deploy
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/deploy/fallback/403.html"
    dest: "{{ asgard_fallback_dest | default('/opt/asgard/fallback') }}/403.html"
    mode: "0644"
    owner: root
    group: root
  when: custom_fallback_403 is succeeded and custom_fallback_403.stat.exists
